<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>The Ledger 18 - Life Stack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style data-source="styles/ledger-ui.css?v=20260628-flicker1">

  :root {
    --bg: #14110d;
    --panel: #1d1914;
    --card: #241f19;
    --line: #3a3128;
    --ink: #f2e7d6;
    --dim: #aa9a82;
    --faint: #716454;
    --accent: #c99b55;
    --accent-2: #d8ad6d;
    --good: #8faf6c;
    --bad: #cc7661;
    --blue: #7ea0ac;
    --money: #c5b45f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; background: var(--bg); color: var(--ink); }
  body {
    font-family: Fraunces, Georgia, serif;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(201,155,85,.08), transparent 42%),
      radial-gradient(ellipse at 85% 100%, rgba(126,160,172,.06), transparent 45%),
      var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  body:before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: .025;
    background-image: repeating-linear-gradient(0deg, transparent 0 2px, #fff 2px 3px);
    z-index: 1;
  }
  button, input, select { font: inherit; }
  button { cursor: pointer; }

  .app {
    width: min(100%, 520px);
    min-height: 100vh;
    margin: 0 auto;
    padding: 22px 16px 138px;
    position: relative;
    z-index: 2;
  }
  .masthead {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    padding-bottom: 13px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }
  .title { font-weight: 900; font-size: 21px; letter-spacing: 0; }
  .vol, .mono {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: .11em;
    text-transform: uppercase;
    color: var(--faint);
  }
  .intro {
    padding: 38px 0 20px;
    text-align: center;
  }
  .brand {
    font-weight: 900;
    font-size: 44px;
    line-height: .95;
    margin-bottom: 12px;
  }
  .brand span { color: var(--accent); font-style: italic; }
  .tagline { margin-bottom: 32px; }
  .field { margin-bottom: 14px; text-align: left; }
  .field label, .section-label {
    display: block;
    font-family: "JetBrains Mono", monospace;
    color: var(--dim);
    font-size: 10px;
    letter-spacing: .13em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  input, select {
    width: 100%;
    color: var(--ink);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 12px;
    outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .primary, .secondary, .choice, .tab, .icon-btn {
    border-radius: 5px;
    border: 1px solid var(--line);
    transition: border-color .15s ease, background .15s ease, transform .15s ease;
  }
  .primary {
    width: 100%;
    padding: 16px;
    border: 0;
    color: var(--bg);
    background: var(--accent);
    font-weight: 900;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .primary:hover { background: var(--accent-2); }
  .secondary {
    width: 100%;
    margin-top: 8px;
    padding: 13px;
    background: transparent;
    color: var(--ink);
  }
  .identity, .stats, .panel, .event-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 5px;
  }
  .identity { padding: 16px; margin-bottom: 12px; }
  .name { font-weight: 900; font-size: 29px; line-height: 1.04; margin: 3px 0 6px; }
  .meta { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--dim); }
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 14px;
    padding: 13px 15px;
    margin-bottom: 14px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
  }
  .stat-name { color: var(--dim); text-transform: uppercase; letter-spacing: .08em; }
  .bar { height: 3px; margin-top: 5px; background: var(--bg); overflow: hidden; }
  .fill { height: 100%; background: var(--accent); transition: width .45s ease; }
  .fill.low { background: var(--bad); }
  .fill.high { background: var(--good); }
  .money {
    grid-column: 1 / -1;
    border-top: 1px dashed var(--line);
    padding-top: 11px;
    display: flex;
    justify-content: space-between;
    font-family: "JetBrains Mono", monospace;
  }
  .money strong { color: var(--money); font-size: 16px; }
  .money .negative { color: var(--bad); }
  .tabs {
    position: sticky;
    top: 0;
    z-index: 3;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    padding: 8px 0;
    background: linear-gradient(to bottom, var(--bg), rgba(20,17,13,.9));
    margin-bottom: 10px;
  }
  .tab {
    min-height: 38px;
    background: var(--panel);
    color: var(--dim);
    font-family: "JetBrains Mono", monospace;
    font-size: 8px;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .tab.active { color: var(--bg); background: var(--accent); border-color: var(--accent); font-weight: 700; }
  .panel { padding: 14px; margin-bottom: 12px; }
  .log { max-height: 375px; overflow-y: auto; padding-right: 3px; }
  .entry { padding: 12px 0; border-bottom: 1px solid var(--line); }
  .entry.latest { animation: highlight .8s ease; }
  @keyframes highlight {
    0% { background: rgba(200,156,90,.16); }
    100% { background: transparent; }
  }
  .entry:first-child { padding-top: 0; }
  .entry:last-child { border-bottom: 0; }
  .stamp { margin-bottom: 5px; }
  .body { font-size: 15px; line-height: 1.45; }
  .deltas { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; font-family: "JetBrains Mono", monospace; font-size: 10px; }
  .up { color: var(--good); }
  .down { color: var(--bad); }
  .neutral { color: var(--blue); }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  .row:last-child { border-bottom: 0; }
  .row-title { font-weight: 700; font-size: 16px; }
  .row-sub { margin-top: 3px; color: var(--dim); font-family: "JetBrains Mono", monospace; font-size: 10px; }
  .mini-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .icon-btn, .choice {
    background: var(--panel);
    color: var(--ink);
    padding: 9px 10px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .07em;
  }
  .icon-btn:hover, .choice:hover, .secondary:hover { border-color: var(--accent); }
  .icon-btn:disabled, .choice:disabled, .secondary:disabled {
    opacity: .35;
    cursor: not-allowed;
  }
  .event-card { padding: 15px; margin-bottom: 10px; animation: up .3s ease; }
  .event-card { scroll-margin: 90px 0 170px; }
  .event-title { color: var(--accent); margin-bottom: 8px; }
  .event-text { font-size: 17px; line-height: 1.38; margin-bottom: 13px; }
  .choices { display: grid; gap: 8px; }
  .choice { width: 100%; text-align: left; font-family: Fraunces, Georgia, serif; font-size: 14px; text-transform: none; letter-spacing: 0; padding: 12px; }
  .action-zone {
    position: fixed;
    z-index: 10;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 24px 16px 22px;
    background: linear-gradient(to top, var(--bg) 72%, rgba(20,17,13,0));
  }
  .action-inner { width: min(100%, 520px); margin: 0 auto; }
  .quick { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 9px; }
  .death { padding: 36px 0; text-align: center; }
  .final-name { font-size: 38px; line-height: 1; font-weight: 900; margin: 8px 0; }
  .cause { text-align: left; line-height: 1.45; padding: 16px; border-left: 2px solid var(--accent); background: var(--card); margin: 20px 0; }
  .legacy { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--line); border: 1px solid var(--line); margin-bottom: 20px; }
  .legacy div { background: var(--card); padding: 13px; text-align: left; }
  .legacy b { display: block; font-size: 18px; margin-top: 4px; }
  .switch {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 11px 0;
    border-bottom: 1px solid var(--line);
  }
  .switch:last-child { border-bottom: 0; }
  .switch input { width: 22px; height: 22px; accent-color: var(--accent); }
  @keyframes in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes up { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

  /* SANDBOX */
  .sb-tag {
    position: fixed;
    top: 12px;
    right: 12px;
    background: var(--accent);
    color: var(--bg);
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .15em;
    padding: 4px 10px;
    border-radius: 3px;
    z-index: 50;
    font-weight: 700;
  }
  .sb-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .sb-back {
    background: none;
    border: 1px solid var(--line);
    color: var(--dim);
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .1em;
    padding: 6px 12px;
    border-radius: 3px;
  }
  .sb-back:hover { color: var(--ink); border-color: var(--accent); }
  .sb-head-title { text-align: right; }
  .sb-head-title .t1 { font-weight: 700; font-size: 22px; }
  .sb-head-title .t2 { font-family: "JetBrains Mono", monospace; font-size: 9px; color: var(--accent); text-transform: uppercase; letter-spacing: .18em; }
  .sb-section { margin-bottom: 20px; }
  .sb-section h3 {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .15em;
    color: var(--faint);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--line);
    font-weight: 400;
  }
  .sb-slider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 11px;
  }
  .sb-slider .lbl { width: 95px; flex-shrink: 0; font-size: 14px; }
  .sb-slider input[type="range"] {
    flex: 1;
    height: 3px;
    background: var(--line);
    -webkit-appearance: none;
    appearance: none;
    border-radius: 2px;
    padding: 0;
    border: 0;
  }
  .sb-slider input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    background: var(--accent);
    border-radius: 50%;
    border: 2px solid var(--bg);
    cursor: pointer;
  }
  .sb-slider input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 50%;
    border: 2px solid var(--bg);
    cursor: pointer;
  }
  .sb-slider .val {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: var(--accent);
    width: 38px;
    text-align: right;
    flex-shrink: 0;
  }
  .sb-money-input {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sb-money-input input { flex: 1; }
  .sb-money-input .preview {
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
    color: var(--accent);
    min-width: 70px;
    text-align: right;
  }
  .sb-check {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
  }
  .sb-check:last-child { border-bottom: 0; }
  .sb-check input[type="checkbox"] {
    -webkit-appearance: none;
    appearance: none;
    width: 19px;
    height: 19px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 3px;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
    position: relative;
  }
  .sb-check input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .sb-check input[type="checkbox"]:checked::after {
    content: "✓";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--bg);
    font-size: 13px;
    font-weight: 700;
  }
  .sb-check .lbl-block { flex: 1; }
  .sb-check .lbl-block .ttl { font-size: 14px; }
  .sb-check .lbl-block .desc { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--dim); margin-top: 3px; }

  /* SPLASH SCREEN */
  .splash {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse 80% 70% at 50% 35%, rgba(200,156,90,.08) 0%, rgba(20,17,13,1) 60%),
      var(--bg);
    padding: 24px;
    text-align: center;
    transition: opacity .5s ease;
  }
  .splash.fading {
    opacity: 0;
    pointer-events: none;
  }
  .splash::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: .025;
    background-image:
      repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(255,255,255,.5) 2px, rgba(255,255,255,.5) 3px),
      repeating-linear-gradient(90deg, transparent 0, transparent 2px, rgba(255,255,255,.5) 2px, rgba(255,255,255,.5) 3px);
    mix-blend-mode: overlay;
  }
  .splash-brand {
    font-family: Fraunces, Georgia, serif;
    font-weight: 900;
    font-size: 4rem;
    line-height: 1;
    letter-spacing: -.03em;
    color: var(--ink);
    text-shadow: 0 0 60px rgba(200, 156, 90, .15);
    margin-bottom: 6px;
    font-variation-settings: "opsz" 144;
  }
  .splash-brand .amp {
    color: var(--accent);
    font-style: italic;
  }
  .splash-tagline {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 40px;
  }
  .splash-loader {
    width: 200px;
    height: 2px;
    background: var(--line);
    margin: 0 auto 16px;
    border-radius: 999px;
    overflow: hidden;
  }
  .splash-loader-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: width .35s ease;
  }
  .splash-status {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--faint);
    min-height: 14px;
    margin-bottom: 36px;
  }
  .splash-tip {
    max-width: 420px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 18px 22px;
    margin: 0 auto 28px;
  }
  .splash-tip-label {
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .splash-tip-text {
    font-family: Fraunces, Georgia, serif;
    font-style: italic;
    font-size: 15px;
    line-height: 1.55;
    color: var(--ink);
    transition: opacity .3s ease;
  }
  .splash-enter {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 12px 28px;
    font-family: Fraunces, Georgia, serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: .1em;
    text-transform: uppercase;
    border-radius: 6px;
    cursor: pointer;
    transition: background .2s, color .2s;
  }
  .splash-enter:hover {
    background: var(--accent);
    color: var(--bg);
  }
  .splash-version {
    position: fixed;
    top: 18px;
    right: 18px;
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: .12em;
    color: var(--faint);
    border: 1px solid var(--line);
    padding: 3px 10px;
    border-radius: 999px;
  }

  /* MARTIAL ARTS DRILL-IN */
  .martial-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background .15s ease;
  }
  .martial-card:last-child { border-bottom: 0; }
  .martial-card:hover { background: var(--card); }
  .martial-card .left { flex: 1; min-width: 0; }
  .martial-card .name {
    font-family: Fraunces, Georgia, serif;
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 3px;
  }
  .martial-card .rank {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .martial-card .rank.trained { color: var(--accent); }
  .martial-card .arrow {
    color: var(--dim);
    font-size: 16px;
    flex-shrink: 0;
  }
  .martial-detail-back {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--dim);
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .1em;
    padding: 7px 12px;
    border-radius: 4px;
    margin-bottom: 14px;
    cursor: pointer;
  }
  .martial-detail-back:hover { color: var(--accent); border-color: var(--accent); }

  /* SAVE SLOTS */
  .slots-block, .new-life-block { margin-bottom: 22px; text-align: left; }
  .slots-block .section-label, .new-life-block .section-label { margin-bottom: 10px; }
  .slot-row {
    display: flex;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 12px 14px;
    margin-bottom: 8px;
    transition: border-color .15s;
  }
  .slot-row:hover { border-color: var(--accent); }
  .slot-row.empty { border-style: dashed; cursor: pointer; }
  .slot-row.empty:hover { background: var(--panel); }
  .slot-info { flex: 1; cursor: pointer; }
  .slot-num { font-family: "JetBrains Mono", monospace; font-size: 9px; text-transform: uppercase; letter-spacing: .12em; color: var(--faint); margin-bottom: 3px; }
  .slot-name { font-weight: 700; font-size: 16px; margin-bottom: 2px; }
  .slot-meta { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--dim); }
  .slot-tag { background: var(--accent); color: var(--bg); font-size: 8px; padding: 2px 6px; border-radius: 2px; margin-left: 4px; }
  .slot-action { font-size: 22px; color: var(--faint); padding: 0 8px; }
  .slot-del { background: none; border: 1px solid var(--line); color: var(--bad); font-size: 16px; width: 28px; height: 28px; border-radius: 3px; padding: 0; flex-shrink: 0; margin-left: 10px; }
  .slot-del:hover { background: var(--bad); color: var(--bg); border-color: var(--bad); }

  /* ========== PHASE 1: NEW LAYOUT ========== */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 10px 14px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    margin-bottom: 8px;
  }
  .topbar .who {
    font-weight: 700;
    font-size: 16px;
    line-height: 1.1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .topbar .who .age-num { color: var(--accent); margin-left: 4px; }
  .topbar .meta {
    display: flex;
    gap: 10px;
    align-items: center;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--dim);
    flex-shrink: 0;
  }
  .topbar .cash { color: var(--accent-2); font-weight: 500; }

  .ribbon {
    display: flex;
    gap: 6px;
    padding: 8px 12px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 5px;
    margin-bottom: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    cursor: pointer;
  }
  .ribbon::-webkit-scrollbar { display: none; }
  .ribbon-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    flex: 0 0 auto;
    min-width: 38px;
  }
  .ribbon-stat .lbl {
    font-family: "JetBrains Mono", monospace;
    font-size: 8px;

/* Landing page save stack. Does not load the playable runtime. */
(function () {
  var SAVE_KEY_PREFIX = "ledger-life-slot-";
  var ACTIVE_SLOT_KEY = "ledger-active-slot";
  var NUM_SLOTS = 5;

  function esc(value) {
    return String(value == null ? "" : value).replace(/[&<>"']/g, function (ch) {
      return ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" })[ch];
    });
  }

  function money(value) {
    var n = Math.round(Number(value) || 0);
    var sign = n < 0 ? "-" : "";
    n = Math.abs(n);
    if (n >= 1e15) return sign + "$" + (n / 1e15).toFixed(1).replace(/\.0$/, "") + "Q";
    if (n >= 1e12) return sign + "$" + (n / 1e12).toFixed(1).replace(/\.0$/, "") + "T";
    if (n >= 1e9) return sign + "$" + (n / 1e9).toFixed(1).replace(/\.0$/, "") + "B";
    if (n >= 1e6) return sign + "$" + (n / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
    if (n >= 10000) return sign + "$" + Math.round(n / 1000).toLocaleString() + "K";
    return sign + "$" + n.toLocaleString();
  }

  function slotKey(idx) {
    return SAVE_KEY_PREFIX + idx;
  }

  function activeSlot() {
    var raw = "1";
    try { raw = localStorage.getItem(ACTIVE_SLOT_KEY) || "1"; } catch (e) {}
    var n = Math.round(Number(raw) || 1);
    return Math.max(1, Math.min(NUM_SLOTS, n));
  }

  function validLife(save) {
    var name = save && typeof save.name === "string" ? save.name.trim() : "";
    var age = Number(save && save.age);
    return !!(save && typeof save === "object" && name && name !== "undefined" && Number.isFinite(age));
  }

  function readSlot(idx) {
    var raw = null;
    try { raw = localStorage.getItem(slotKey(idx)); } catch (e) {}
    if (!raw) return { idx:idx, occupied:false };
    try {
      var save = JSON.parse(raw);
      if (save && save.state) save = save.state;
      if (!validLife(save)) return { idx:idx, occupied:false, broken:true };
      return {
        idx: idx,
        occupied: true,
        name: save.name || "Unnamed life",
        age: Number(save.age) || 0,
        alive: save.alive !== false,
        sandboxMode: !!save.sandboxMode,
        netWorth: netWorth(save),
        city: save.city || "Unknown city",
        generation: save.legacy && save.legacy.generation || 1,
        lastLog: Array.isArray(save.log) && save.log.length ? String(save.log[0].text || "") : ""
      };
    } catch (e2) {
      return { idx:idx, occupied:false, broken:true };
    }
  }

  function netWorth(save) {
    var finance = save.finance || {};
    var debts = finance.debts || {};
    var stocks = finance.stocksV18 || {};
    var firm = finance.personalFirm || {};
    var assets = 0;
    assets += Number(save.money) || 0;
    assets += Number(save.savings) || 0;
    assets += Number(save.ira) || 0;
    assets += Number(save.retirement401k) || 0;
    assets += Number(finance.superSaver) || 0;
    assets += Number(finance.brokerage) || 0;
    assets += Number(stocks.marketValue) || Number(stocks.value) || 0;
    assets += Number(firm.capital) || Number(firm.managed) || 0;
    var debt = Number(save.debt) || 0;
    debt += Number(finance.taxDebt) || 0;
    debt += Number(finance.assetBackedLoan) || 0;
    Object.keys(debts).forEach(function (key) { debt += Math.max(0, Number(debts[key]) || 0); });
    return Math.round(assets - debt);
  }

  function playPage() {
    var path = String(window.location.pathname || "");
    return /(?:_landing_built|_built)\.html$/i.test(path) || /\/dist\//i.test(path)
      ? "Ledger_18_dynamic_stocks_v18_35_play_built.html"
      : "play.html";
  }

  function goPlay(query) {
    window.location.href = playPage() + query;
  }

  function setStyle(kind, value) {
    try { localStorage.setItem(kind === "theme" ? "ledger-ui-theme" : "ledger-ui-density", value); } catch (e) {}
    applyStyle();
    render();
  }

  function applyStyle() {
    var theme = "classic";
    var density = "roomy";
    try { theme = localStorage.getItem("ledger-ui-theme") || theme; } catch (e) {}
    try { density = localStorage.getItem("ledger-ui-density") || density; } catch (e2) {}
    document.documentElement.dataset.ledgerTheme = theme;
    document.documentElement.dataset.ledgerDensity = density;
  }

  function deleteSlot(idx) {
    if (!window.confirm("Delete save slot " + idx + "?")) return;
    try { localStorage.removeItem(slotKey(idx)); } catch (e) {}
    render();
  }

  function continueSlot(idx) {
    try { localStorage.setItem(ACTIVE_SLOT_KEY, String(idx)); } catch (e) {}
    goPlay("?slot=" + idx + "&from=landing");
  }

  function newSlot(idx) {
    try { localStorage.setItem(ACTIVE_SLOT_KEY, String(idx)); } catch (e) {}
    goPlay("?new=1&slot=" + idx + "&from=landing");
  }

  function sandboxSlot(idx) {
    try { localStorage.setItem(ACTIVE_SLOT_KEY, String(idx)); } catch (e) {}
    goPlay("?sandbox=1&slot=" + idx + "&from=landing");
  }

  function pulseBars() {
    var heights = [34, 48, 70, 42, 59, 28, 66, 84, 51, 72, 36, 63, 77, 44, 58, 32, 68, 52];
    return heights.map(function (h) { return '<span style="height:' + h + '%"></span>'; }).join("");
  }

  function saveCard(slot, active) {
    if (!slot.occupied) {
      return '<article class="landing-save empty">' +
        '<div class="landing-save-top"><div><div class="landing-save-name">Slot ' + slot.idx + '</div>' +
        '<div class="landing-save-meta">' + (slot.broken ? "Unreadable save was ignored. Start clean here." : "Empty - start a new life here.") + '</div></div>' +
        '<div class="landing-card-v">' + (slot.broken ? "Fix" : "New") + '</div></div>' +
        '<div class="landing-save-actions"><button class="landing-btn green" data-action="new" data-slot="' + slot.idx + '">New Life</button>' +
        '<button class="landing-btn blue" data-action="sandbox" data-slot="' + slot.idx + '">Sandbox</button></div></article>';
    }
    return '<article class="landing-save ' + (slot.idx === active ? "active" : "") + '">' +
      '<div class="landing-save-top"><div><div class="landing-save-name">Slot ' + slot.idx + ' - ' + esc(slot.name) + '</div>' +
      '<div class="landing-save-meta">' + (slot.alive ? "Age " + slot.age : "Deceased at " + slot.age) + ' - Gen ' + esc(slot.generation) + ' - Net ' + money(slot.netWorth) + (slot.sandboxMode ? " - Sandbox" : "") + '<br>' + esc(slot.city) + (slot.lastLog ? ' - ' + esc(slot.lastLog).slice(0, 86) : "") + '</div></div>' +
      '<div class="landing-card-v">' + money(slot.netWorth) + '</div></div>' +
      '<div class="landing-save-actions"><button class="landing-btn green" data-action="continue" data-slot="' + slot.idx + '">Continue</button>' +
      '<button class="landing-btn blue" data-action="new" data-slot="' + slot.idx + '">New Over</button>' +
      '<button class="landing-btn red" data-action="delete" data-slot="' + slot.idx + '">Delete</button></div></article>';
  }

  function render() {
    applyStyle();
    var root = document.getElementById("landing-app");
    if (!root) return;
    var active = activeSlot();
    var slots = [];
    for (var i = 1; i <= NUM_SLOTS; i += 1) slots.push(readSlot(i));
    var occupied = slots.filter(function (slot) { return slot.occupied; }).length;
    var live = slots.filter(function (slot) { return slot.occupied && slot.alive; }).length;
    var totalNet = slots.reduce(function (sum, slot) { return sum + (slot.occupied ? slot.netWorth : 0); }, 0);
    var theme = "classic";
    var density = "roomy";
    try { theme = localStorage.getItem("ledger-ui-theme") || theme; } catch (e) {}
    try { density = localStorage.getItem("ledger-ui-density") || density; } catch (e2) {}

    root.innerHTML = '<section class="landing-hero">' +
      '<div class="landing-stage"><div><div class="landing-kicker">Life stack gate</div><h1 class="landing-title">The Ledger</h1>' +
      '<p class="landing-sub">Choose the life you actually want before the simulation loads. The playable runtime now lives behind this gate, so an old active slot cannot randomly take over the first screen.</p></div>' +
      '<div class="landing-pulse"><div class="landing-pulse-track">' + pulseBars() + '</div><div class="landing-card-grid">' +
      '<div class="landing-card"><div class="landing-card-k">Saved lives</div><div class="landing-card-v">' + occupied + '/' + NUM_SLOTS + '</div></div>' +
      '<div class="landing-card"><div class="landing-card-k">Live slots</div><div class="landing-card-v">' + live + '</div></div>' +
      '<div class="landing-card"><div class="landing-card-k">Stack worth</div><div class="landing-card-v">' + money(totalNet) + '</div></div>' +
      '</div></div><div class="landing-footer"><div class="landing-small">Active slot ' + active + '</div><button class="landing-btn blue" data-action="sandbox" data-slot="' + active + '">Open Sandbox</button></div></div>' +
      '<aside class="landing-stack"><div class="landing-stack-head"><div><div class="landing-kicker">Community stack</div><div class="landing-stack-title">Past Lives + Saves</div></div><button class="landing-btn green" data-action="new" data-slot="' + active + '">New Life</button></div>' +
      '<section class="landing-panel"><div class="landing-kicker">Style menu</div><div class="landing-pref-grid">' +
      '<button class="landing-pref ' + (theme === "classic" ? "selected" : "") + '" data-pref="theme" data-value="classic"><div class="landing-pref-label">Classic</div><span>Warm paper, gold commands, current Ledger feel.</span></button>' +
      '<button class="landing-pref ' + (theme === "signal" ? "selected" : "") + '" data-pref="theme" data-value="signal"><div class="landing-pref-label">Signal</div><span>More blue and green contrast for finance-heavy play.</span></button>' +
      '<button class="landing-pref ' + (density === "roomy" ? "selected" : "") + '" data-pref="density" data-value="roomy"><div class="landing-pref-label">Roomy</div><span>Bigger touch targets and wider spacing.</span></button>' +
      '<button class="landing-pref ' + (density === "compact" ? "selected" : "") + '" data-pref="density" data-value="compact"><div class="landing-pref-label">Compact</div><span>Tighter menus for big finance and stock screens.</span></button></div></section>' +
      '<div class="landing-save-list">' + slots.map(function (slot) { return saveCard(slot, active); }).join("") + '</div></aside></section>';
  }

  document.addEventListener("click", function (event) {
    var pref = event.target.closest("[data-pref]");
    if (pref) {
      event.preventDefault();
      return setStyle(pref.dataset.pref, pref.dataset.value);
    }
    var btn = event.target.closest("[data-action]");
    if (!btn) return;
    event.preventDefault();
    var slot = Math.max(1, Math.min(NUM_SLOTS, Math.round(Number(btn.dataset.slot) || activeSlot())));
    var action = btn.dataset.action;
    if (action === "continue") return continueSlot(slot);
    if (action === "new") return newSlot(slot);
    if (action === "sandbox") return sandboxSlot(slot);
    if (action === "delete") return deleteSlot(slot);
  });

  render();
})();

</script>
</body>
</html>
